# AWS Amplify build spec - Deploys Next.js app as a website
version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
            - npx prisma generate
        build:
          commands:
            - npm run build
        postBuild:
          commands:
            - npx prisma migrate deploy
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
    env:
      variables:
        NODE_ENV: production
